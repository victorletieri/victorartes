<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Artes</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
            color: white;
            text-align: center;
        }
        .container { max-width: 400px; margin: auto; padding: 20px; }
        .logo { width: 120px; margin: 20px auto; }
        h2 { margin-bottom: 25px; }

        .botao {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1f1f1f;
            padding: 15px;
            margin: 12px 0;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: none;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }

        .botao:active { transform: scale(0.97); }

        .icone {
            width: 45px;
            height: 45px;
            background: #e60000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .texto { text-align: left; }
        .sub { font-size: 12px; color: #aaa; }

        /* Barra de interação */
        .interacao {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 15px;
            background: #1f1f1f;
            border-radius: 20px;
            border: 1px solid #333;
        }
        .item-interacao { cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .item-interacao span { font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo">
    <h2>Victor Artes</h2>

    <a class="botao" href="https://wa.me/5511997344995?text=Olá%20Victor%20Artes">
        <div class="icone">📞</div>
        <div class="texto">Contato<div class="sub">Fale direto no WhatsApp</div></div>
    </a>

    <a class="botao" href="https://docs.google.com/forms/d/e/1FAIpQLScU2dxmpMEDK6s-I7OxFCReEF3EFnlznqm3PeesvNHPdlFpZA/viewform?usp=header">
        <div class="icone">📚</div>
        <div class="texto">Livros<div class="sub">Conheça nossas obras</div></div>
    </a>

    <a class="botao" href="https://docs.google.com/forms/d/e/1FAIpQLSdfIhiagYl2u1O0EwWGJvi-c4BlCQu5CjlMHQe6DYhgXzcEtQ/viewform?usp=header">
        <div class="icone">🎨</div>
        <div class="texto">Desenhos para Colorir<div class="sub">Baixe ou peça seus desenhos</div></div>
    </a>

    <div class="interacao">
        <div class="item-interacao">👁️ <span>120</span></div>
        <div class="item-interacao" onclick="curtir()">❤️ <span id="txt-curtidas">45</span></div>
        <div class="item-interacao" onclick="comentar()">💬 <span id="txt-comentarios">12</span></div>
    </div>
</div>

<script>
    function curtir() {
        let el = document.getElementById('txt-curtidas');
        el.innerText = parseInt(el.innerText) + 1;
    }
    function comentar() {
        let msg = prompt("Deixe seu comentário:");
        if(msg) {
            let el = document.getElementById('txt-comentarios');
            el.innerText = parseInt(el.innerText) + 1;
        }
    }
</script>

</body>
</html>
